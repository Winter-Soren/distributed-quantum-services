services:
  backend-v2:
    build:
      context: .
      dockerfile: backend-v2/Dockerfile
    environment:
      QB2_API_HOST: "${QB2_API_HOST:-0.0.0.0}"
      QB2_API_PORT: "${QB2_API_PORT:-8080}"
      QB2_ENVIRONMENT: "${QB2_ENVIRONMENT:-development}"
      QB2_SERVICE_NAME: "${QB2_SERVICE_NAME:-quantum-backend-v2}"
      QB2_JSON_LOGS: "${QB2_JSON_LOGS:-true}"
      QB2_LOG_LEVEL: "${QB2_LOG_LEVEL:-INFO}"
      QB2_AUTH_REQUIRED: "${QB2_AUTH_REQUIRED:-false}"
      QB2_POSTGRES_TARGET: "${QB2_POSTGRES_TARGET:-neon}"
      QB2_POSTGRES_NEON_POOLED_DSN: "${QB2_POSTGRES_NEON_POOLED_DSN:-}"
      QB2_POSTGRES_NEON_DIRECT_DSN: "${QB2_POSTGRES_NEON_DIRECT_DSN:-}"
      QB2_POSTGRES_DATABASE: "${QB2_POSTGRES_DATABASE:-neondb}"
      QB2_MONGODB_TARGET: "${QB2_MONGODB_TARGET:-remote}"
      QB2_MONGODB_REMOTE_URI: "${QB2_MONGODB_REMOTE_URI:-}"
      QB2_MONGODB_DATABASE: "${QB2_MONGODB_DATABASE:-qds}"
      QB2_PEER_LOG_DIR: "${QB2_PEER_LOG_DIR:-/workspace/backend-v2/quantum-backend-v2/peer-logs}"
      QB2_PEER_ID: "${QB2_PEER_ID:-qb2-local-peer}"
      QB2_LIBP2P_ENABLED: "${QB2_LIBP2P_ENABLED:-true}"
      QB2_LIBP2P_PEER_ID: "${QB2_LIBP2P_PEER_ID:-qb2-local-peer}"
      QB2_LIBP2P_LISTEN_MULTIADDRS: "${QB2_LIBP2P_LISTEN_MULTIADDRS:-/ip4/0.0.0.0/tcp/4011}"
      QB2_LIBP2P_PEERSTORE_PATH: "${QB2_LIBP2P_PEERSTORE_PATH:-/workspace/backend-v2/quantum-backend-v2/libp2p/peerstore.sqlite3}"
      QB2_LIBP2P_ACTIVATE_LISTENERS: "${QB2_LIBP2P_ACTIVATE_LISTENERS:-false}"
      QB2_LIBP2P_DEV_SERVICE_PEER_COUNT: "${QB2_LIBP2P_DEV_SERVICE_PEER_COUNT:-0}"
      QB2_LIBP2P_DEV_SERVICE_BASE_PORT: "${QB2_LIBP2P_DEV_SERVICE_BASE_PORT:-4021}"
    volumes:
      - backend_v2_runtime:/workspace/backend-v2/quantum-backend-v2
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/v1/health', timeout=5)"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend-v2:
    build:
      context: ./frontend-v2
    depends_on:
      backend-v2:
        condition: service_healthy
    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      QUANTUM_BACKEND_API_KEY: "${QUANTUM_BACKEND_API_KEY:-}"
      QUANTUM_BACKEND_URL: "http://backend-v2:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  caddy:
    image: caddy:2.10-alpine
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend-v2:
        condition: service_healthy
      frontend-v2:
        condition: service_healthy
    environment:
      CADDY_FRONTEND_SITE_ADDRESS: "${CADDY_FRONTEND_SITE_ADDRESS:-http://localhost:3000}"
      CADDY_LEGACY_FRONTEND_SITE_ADDRESS: "${CADDY_LEGACY_FRONTEND_SITE_ADDRESS:-http://localhost:3003}"
      CADDY_API_SITE_ADDRESS: "${CADDY_API_SITE_ADDRESS:-http://localhost:8080}"
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:8080:8080"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  backend_v2_runtime:
  caddy_data:
  caddy_config:
