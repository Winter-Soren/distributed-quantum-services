environment: development

api:
  host: 0.0.0.0
  port: 8080
  enable_cors: true
  cors_origins:
    - "*"
  max_request_bytes: 1000000
  enable_auth: false
  api_key: null
  enable_rate_limit: false
  rate_limit_per_minute: 60

logging:
  level: INFO
  json_logs: true
  service_name: quantum-coordinator

database:
  path: ./data/quantum_coordinator.db
  enable_wal_mode: true

discovery:
  refresh_interval_seconds: 30
  stale_timeout_seconds: 120
  service_ad_topic: /quantum-coordinator/service-ads/v1

runtime:
  max_retries: 3
  base_timeout_seconds: 5.0
  backoff_multiplier: 2.0

libp2p:
  enabled: true
  enable_mdns: false
  coordinator_listen_addrs:
    - /ip4/127.0.0.1/tcp/9100
  gate_protocol_id: /quantum-coordinator/gate-exec/1.0.0
  embedded_service_count: 3
  embedded_service_base_port: 9200
  embedded_ad_interval_seconds: 5.0
